<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="reset.css">
      <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="sidebar ">
  
       <div class="app">
        <img class="iconimage" src="img/icons.png">
       <div class="appname">
          TaskFlows 
       </div>
       </div>


       <div class="categories">
        <div class="categoriestopic">
         КАТЕГОРИИ
        </div> 
         <button class="categoriesBlock">    
        🗂️ Все задачи
         </button> 
         <button  class="categoriesBlock">
        ⭐ Важные
        </button > 
         <button class="categoriesBlock">
         📅 На сегодня
        </button> 
       </div>


         <div class="categories">
        <div class="categoriestopic">
         ПРОЕКТЫ
        </div> 
         <button class="projectBlock">    
         Работа
         </button> 
         <button  class="projectBlock">
         Учёба
        </button > 
         <button class="projectBlock">
         Что-то
        </button> 
       </div>

    </div>
 



    <div class="main-content">
        
      <h1>Все задачи</h1>
      <div class="tasks">
          12 задач, 5 на сегодня
      </div>
     
       <div class="tasks">
       

      
        <button class="addtaskbutton"> <span class="addtaskplus">+</span> Добавить задачу</button>

        <div class="gradient-line"></div>
           
        <div class="search-box">
        <input type="text" placeholder="Поиск..." class="searchTaskButton">
        </div>
        
        
        <div class="taskblock">

             
            <label>
            <input type="checkbox">
            <span class="sspan"> </span>
            </label>


          <div>
            <button class="taskname">Название задачи</button>    
            <span class="taskProjectTag">Работа</span>  <span class="taskProjectTag">Срочно</span>
          </div>  

            <button class="deleteTaskFromList"> 
            <svg
           
            fill="#000000" 
            viewBox="-2.64 -2.64 29.28 29.28" 
            xmlns="http://www.w3.org/2000/svg" 
            transform="rotate(45)" 
            stroke="#000000" stroke-width="0.00024000000000000003">
            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
            <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" stroke="#CCCCCC" stroke-width="0.43200000000000005">
            </g><g id="SVGRepo_iconCarrier">
            <path d="M5.755,20.283,4,8H20L18.245,20.283A2,2,0,0,1,16.265,22H7.735A2,2,0,0,1,5.755,20.283ZM21,4H16V3a1,1,0,0,0-1-1H9A1,1,0,0,0,8,3V4H3A1,1,0,0,0,3,6H21a1,1,0,0,0,0-2Z"></path></g>
          
          </svg>
            </button>
          
        

        </div> 

       <div id="tasks-container"></div>
    
    </div>

 <script src="script.js"></script>    
</body>
</html>
